name: Update README on Push to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  models: read
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes and update README via Copilot
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import urllib.request
          import subprocess
          import sys

          # Read current README
          with open('README.md', 'r') as f:
              readme = f.read()

          # Get diff of everything except README.md itself
          result = subprocess.run(
              ['git', 'diff', 'HEAD~1', 'HEAD', '--',
               '.', ':(exclude)README.md'],
              capture_output=True, text=True
          )
          diff = result.stdout.strip()

          if not diff:
              print("No significant changes detected outside README.md — skipping update.")
              sys.exit(0)

          # Truncate to stay within the model's ~128k context window while
          # prioritising the diff (12 000 chars) over the README (8 000 chars).
          diff = diff[:12000]
          readme_snippet = readme[:8000]

          token = os.environ['GITHUB_TOKEN']

          prompt = (
              "You are a technical documentation expert. "
              "Analyze the git diff below and return an updated version of the README.md that accurately reflects the changes.\n\n"
              "Rules:\n"
              "- Only update sections that are directly affected by the diff (new features, removed features, API changes, dependency updates, config changes, etc.).\n"
              "- Keep every section that is unaffected completely unchanged.\n"
              "- If no update is needed, return the README exactly as provided.\n"
              "- Return ONLY the raw README content — no explanation, no markdown fences.\n\n"
              f"### Current README\n{readme_snippet}\n\n"
              f"### Git Diff (recent push)\n```diff\n{diff}\n```"
          )

          payload = json.dumps({
              "model": "gpt-4o",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 8192
          }).encode()

          req = urllib.request.Request(
              'https://models.inference.ai.azure.com/chat/completions',
              data=payload,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json'
              }
          )

          try:
              with urllib.request.urlopen(req) as response:
                  api_result = json.loads(response.read())
          except urllib.error.URLError as exc:
              print(f"Network error calling GitHub Models API: {exc}")
              sys.exit(1)
          except json.JSONDecodeError as exc:
              print(f"Failed to parse API response as JSON: {exc}")
              sys.exit(1)

          choices = api_result.get('choices')
          if not choices or not isinstance(choices, list):
              print(f"Unexpected API response structure: {api_result}")
              sys.exit(1)

          updated_readme = choices[0].get('message', {}).get('content', '').strip()
          if not updated_readme:
              print("API returned an empty response — skipping update.")
              sys.exit(0)

          # Strip accidental markdown fences the model may wrap the output in
          # (e.g. ```markdown ... ``` or ``` ... ```)
          lines = updated_readme.splitlines()
          if lines and lines[0].startswith('```') and lines[-1].strip() == '```':
              updated_readme = '\n'.join(lines[1:-1])

          with open('README.md', 'w') as f:
              f.write(updated_readme)

          print("README.md updated successfully.")

          # Signal to subsequent steps that the README was changed
          github_output = os.environ.get('GITHUB_OUTPUT', '')
          if github_output:
              with open(github_output, 'a') as f:
                  f.write('readme_updated=true\n')
          PYEOF

      - name: Open PR with updated README
        id: create-pr
        if: steps.update.outputs.readme_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="readme-update-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md
          if git diff --staged --quiet; then
            echo "README.md content unchanged — skipping PR."
            exit 0
          fi
          git commit -m "docs: auto-update README via Copilot"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "docs: auto-update README (run #${{ github.run_number }})" \
            --body "This PR was automatically generated by the **Update README** workflow after a push to \`main\`.

          Please review the README changes below and merge when satisfied." \
            --base main \
            --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Send email notification
        if: steps.create-pr.conclusion == 'success' && steps.create-pr.outputs.pr_url != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Artha] README auto-updated — please review & merge"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hi,

            The GitHub Actions workflow detected meaningful code changes in the Artha repository
            and has automatically updated README.md.

            Please review the proposed changes and merge the pull request when you are satisfied:

              ${{ steps.create-pr.outputs.pr_url }}

            This PR was triggered by commit ${{ github.sha }} pushed by ${{ github.actor }}.

            — GitHub Actions Bot
