services:
  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: artha-service-registry
    ports:
      - "8761:8761"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: artha-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: artha-api-gateway
    depends_on:
      service-registry:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: artha-user-service
    depends_on:
      - service-registry
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8083:8083"
    restart: unless-stopped

  budget-service:
    build:
      context: ./budget
      dockerfile: Dockerfile
    container_name: artha-budget-service
    depends_on:
      - service-registry
      - user-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      SERVICES_USER_SERVICE_URL: http://user-service:8083
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8081:8081"
    restart: unless-stopped

  expense-service:
    build:
      context: ./expense
      dockerfile: Dockerfile
    container_name: artha-expense-service
    depends_on:
      - service-registry
      - user-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      SERVICES_USER_SERVICE_URL: http://user-service:8083
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8082:8082"
    restart: unless-stopped

  frontend:
    build:
      context: ./artha-frontend
      dockerfile: Dockerfile
    container_name: artha-frontend
    depends_on:
      - api-gateway
      - budget-service
      - expense-service
    ports:
      - "5173:5173"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped
