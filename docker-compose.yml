services:

  # ── Service Registry (Eureka) ────────────────────────────────────────────────
  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: artha-service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: artha-api-gateway
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://service-registry:8761/eureka/}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ── User Service ─────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: artha-user-service
    depends_on:
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://service-registry:8761/eureka/}
      SPRING_DATASOURCE_URL: ${USER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8083:8083"
    restart: unless-stopped

  # ── Budget Service ───────────────────────────────────────────────────────────
  budget-service:
    build:
      context: ./budget
      dockerfile: Dockerfile
    container_name: artha-budget-service
    depends_on:
      service-registry:
        condition: service_healthy
      user-service:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://service-registry:8761/eureka/}
      SERVICES_USER_SERVICE_URL: http://user-service:8083
      SPRING_DATASOURCE_URL: ${BUDGET_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${BUDGET_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BUDGET_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8081:8081"
    restart: unless-stopped


  # ── Expense Service ──────────────────────────────────────────────────────────
  expense-service:
    build:
      context: ./expense
      dockerfile: Dockerfile
    container_name: artha-expense-service
    depends_on:
      service-registry:
        condition: service_healthy
      user-service:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://service-registry:8761/eureka/}
      SERVICES_USER_SERVICE_URL: http://user-service:8083
      SPRING_DATASOURCE_URL: ${EXPENSE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${EXPENSE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${EXPENSE_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    ports:
      - "8082:8082"
    restart: unless-stopped

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: artha-notification-service
    depends_on:
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 8086
      MONGODB_URI: ${MONGODB_URI}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29092}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-notification-service-group}
      EUREKA_HOST: service-registry
      EUREKA_PORT: 8761
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      NODE_ENV: production
    ports:
      - "8086:8086"
    restart: unless-stopped

  # ── Analysis Service ─────────────────────────────────────────────────────────
  analysis-service:
    build:
      context: ./analysis-service
      dockerfile: Dockerfile
    container_name: artha-analysis-service
    depends_on:
      service-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      EUREKA_SERVER: ${EUREKA_SERVER_URL:-http://service-registry:8761/eureka/}
      API_GATEWAY_URL: http://api-gateway:8080
      MONGO_DETAILS: ${MONGO_DETAILS}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "8084:8084"
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./artha-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: artha-frontend
    depends_on:
      - api-gateway
    ports:
      - "5173:80"
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: artha-redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis UI ──────────────────────────────────────────────────────────────────
  redis-insight:
    image: redislabs/redisinsight:1.14.0
    container_name: redis-insight
    ports:
      - "8087:8001"
    depends_on:
      - redis
    restart: unless-stopped

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST → reachable from the host machine (localhost:9092)
      # PLAINTEXT_INTERNAL → reachable from other Docker containers (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://${SERVER_IP:-localhost}:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped


  # ── Kafka UI ──────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: artha-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped