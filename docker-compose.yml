# ═══════════════════════════════════════════════════════════════════════════════
# Artha — Production Docker Compose
# Target: Single DigitalOcean Droplet (8GB RAM, 2 vCPU)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: artha-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - artha-net

  # ── Service Registry (Eureka) ─────────────────────────────────────────────
  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: artha-service-registry
    # Temporarily exposed for direct Eureka access/debugging
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    environment:
      SERVER_IP: ${SERVER_IP}
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - artha-net

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: artha-api-gateway
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: ${REDIS_SSL:-true}
      SERVER_IP: ${SERVER_IP}
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_INSTANCE_ID: ${SERVER_IP:-localhost}:api-gateway:8080
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    # Port 8080 not exposed publicly — all traffic goes through Nginx on port 80
    # To access locally for debugging: docker compose exec api-gateway curl localhost:8080
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 450m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - artha-net

  # ── User Service ──────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: artha-user-service
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      SPRING_DATASOURCE_URL: ${USER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SSL}
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_SSL_TRUST_STORE_LOCATION: file:/app/certs/client.truststore.jks
      SPRING_KAFKA_SSL_KEY_STORE_LOCATION: file:/app/certs/client.keystore.p12
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_IP: ${SERVER_IP}
      EUREKA_INSTANCE_HOSTNAME: user-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_INSTANCE_ID: ${SERVER_IP:-localhost}:user-service:8083
      FRONTEND_URL: ${FRONTEND_URL}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - artha-net

  # ── Budget Service ────────────────────────────────────────────────────────
  budget-service:
    build:
      context: ./budget
      dockerfile: Dockerfile
    container_name: artha-budget-service
    depends_on:
      service-registry:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      SERVICES_USER_SERVICE_URL: http://user-service:8083
      SPRING_DATASOURCE_URL: ${BUDGET_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${BUDGET_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BUDGET_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SSL}
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_SSL_TRUST_STORE_LOCATION: file:/app/certs/client.truststore.jks
      SPRING_KAFKA_SSL_KEY_STORE_LOCATION: file:/app/certs/client.keystore.p12
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: ${REDIS_SSL:-true}
      SERVER_IP: ${SERVER_IP}
      EUREKA_INSTANCE_HOSTNAME: budget-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_INSTANCE_ID: ${SERVER_IP:-localhost}:budget-service:8081
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8081/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - artha-net

  # ── Expense Service ───────────────────────────────────────────────────────
  expense-service:
    build:
      context: ./expense
      dockerfile: Dockerfile
    container_name: artha-expense-service
    depends_on:
      service-registry:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      SERVICES_USER_SERVICE_URL: http://user-service:8083
      SPRING_DATASOURCE_URL: ${EXPENSE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${EXPENSE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${EXPENSE_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SSL}
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_SSL_TRUST_STORE_LOCATION: file:/app/certs/client.truststore.jks
      SPRING_KAFKA_SSL_KEY_STORE_LOCATION: file:/app/certs/client.keystore.p12
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: ${REDIS_SSL:-true}
      SERVER_IP: ${SERVER_IP}
      EUREKA_INSTANCE_HOSTNAME: expense-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_INSTANCE_ID: ${SERVER_IP:-localhost}:expense-service:8082
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - artha-net

  # ── Notification Service ──────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: artha-notification-service
    init: true
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      API_GATEWAY_URL: ${API_GATEWAY_URL}
      PORT: 8086
      MONGODB_URI: ${MONGODB_URI}
      KAFKA_BROKER: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKAJS_SSL: ${KAFKAJS_SSL:-true}
      NOTIFICATION_EXPENSE_GROUP_ID: ${NOTIFICATION_EXPENSE_GROUP_ID:-notification-expense-group}
      NOTIFICATION_COMPANY_GROUP_ID: ${NOTIFICATION_COMPANY_GROUP_ID:-notification-company-group}
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      SERVER_IP: ${SERVER_IP:-localhost}
      EUREKA_INSTANCE_IP_ADDRESS: ${SERVER_IP:-localhost}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./certs:/app/src/certs:ro
    networks:
      - artha-net

  # ── Analysis Service ──────────────────────────────────────────────────────
  analysis-service:
    build:
      context: ./analysis-service
      dockerfile: Dockerfile
    container_name: artha-analysis-service
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      ANALYSIS_EXPENSE_GROUP_ID: ${ANALYSIS_EXPENSE_GROUP_ID:-analysis-expense-group}
      ANALYSIS_BUDGET_GROUP_ID: ${ANALYSIS_BUDGET_GROUP_ID:-analysis-budget-group}
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      API_GATEWAY_URL: http://api-gateway:8080
      MONGO_DETAILS: ${MONGO_DETAILS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: ${REDIS_SSL:-true}
      SERVER_IP: ${SERVER_IP}
      KAFKA_SSL_ENABLED: ${KAFKA_SSL_ENABLED:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/docs"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./certs:/app/app/certs:ro
    networks:
      - artha-net

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  artha-net:
    driver: bridge
