spring.application.name=expense-service
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Neon PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:${EXPENSE_DB_URL:jdbc:postgresql://localhost:5432/expense}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${EXPENSE_DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${EXPENSE_DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=540000
spring.datasource.hikari.idle-timeout=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8082

services.user-service.url=http://user-service

spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# Kafka Configuration
spring.kafka.producer.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka SSL Configuration
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.ssl.trust-store-location=classpath:certs/client.truststore.jks
spring.kafka.ssl.trust-store-password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
spring.kafka.ssl.key-store-location=classpath:certs/client.keystore.p12
spring.kafka.ssl.key-store-password=${KAFKA_SSL_KEYSTORE_PASSWORD:}
spring.kafka.ssl.key-password=${KAFKA_SSL_KEYSTORE_PASSWORD:}

# Eureka configuration - Smart Switching between IP (Native) and Hostname (Docker)
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:${SERVER_IP:localhost}}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
eureka.instance.ip-address=${SERVER_IP:localhost}
eureka.instance.instance-id=${SERVER_IP:localhost}:${spring.application.name}:${server.port}

# Redis Caching Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
